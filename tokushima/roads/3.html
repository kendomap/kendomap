<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;

  width: 100%;
  height: 300px;
  border-radius: 8px;

<body>

<h1>香川・徳島県道3号　志度山川線</h1>

<div class="card">
<p><b>ランク：</b> ★★★★☆・★★☆☆☆・★☆☆☆☆</p>
<p><b>特徴：</b> 幅員狭い・カーブ多め</p>
<p><b>注意：</b> 離合困難区間あり</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
香川県と徳島県を繋ぐ越境路線。県境から徳島県側の南端のヘアピン付近までが廃道状態で通行不能。通行不能区間中にある峠は通称109峠と呼ばれる。これは、この峠を陸上自衛隊第109大隊が整備したため。
</p>
</div>

<div class="card">
<p><b>走行動画・ウェブサイト</b></p>
<a href="https://youtu.be/H8MGNXuJ5YU?si=S65IKscJ9-iBYBLA/" target="_blank">これが「重要な県道」ってマジですか？？【香川・徳島県道3号 志度山川線】</a><br>

<a href="https://youtu.be/-EceU99Idq0?si=94491eZJgaue5lx5" target="_blank">【険道】徳島・香川 県道3号　志度山川線　109峠</a>
</div>

<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>

<script>
const center = [34.164776,134.228251]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("109峠")
  .openPopup();

</script>
