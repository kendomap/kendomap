<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>岩手県道204号　大志田停車場線</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#smallmap {
  width: 100%;
  height: 300px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>岩手県道204号・大志田停車場線</h1>

<div class="card">
<p><b>ランク：</b> ★★★★☆</p>
<p><b>特徴：</b> ダート・通行止区間有</p>
<p><b>注意：</b> 冬季閉鎖・通行止区間有</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
かつてのJR大志田駅と国道455号を結んでいる。
近年は路肩の崩落により通年全面通行止となっており、走破は困難。
</p>
</div>

<div class="card">
<p><b>走行動画</b></p>
  <br>
  ・<a href="https://youtu.be/EvoZqZAewhY?si=7PqNWS_lg26mA2Rf" target="_blank">特大の穴が開いた県道…辿り着けないんだが…[岩手県道204号 大志田停車場線]</a>
  <br>
・<a href="https://youtu.be/vq2rhMvzbUc?si=ZMVM4FSIc4P46oLW" target="_blank">【岩手県道#008】セローで走る岩手の林道#50 最終回 大志田停車場線(岩手県道204号)</a>
  
<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>
<br>

<a href="../index.html">← 岩手県ページに戻る</a>

<script>

// ★ここだけ変えればOK（県道の位置）
const center = [39.741606,141.281290]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("旧大志田駅")
  .openPopup();

</script>
  
</body>
</html>
