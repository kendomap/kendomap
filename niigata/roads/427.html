<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>新潟県道427号</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#smallmap {
  width: 100%;
  height: 300px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>新潟県道427号　五十子平真田線</h1>

<div class="card">
<p><b>ランク：</b> ★★★☆☆</p>
<p><b>特徴：</b>崖沿いの道</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
両端付近が国道の峠越えの旧道である。海老(かいろう)〜薬師峠間は急な崖沿いの道が数百メートル続く。
海老集落付近にかなり廃れた区間があるが、バイパスのような道があり、迂回可能。この道を県道とする地図もある。
</p>
</div>

<div class="card">
<p><b>走行動画・ウェブサイト</b></p>
<a href="https://youtu.be/sBRE-D3-k_8?si=EupGhW-wsBTYpZhg/" target="_blank">【険道♦️/本当に"通行止"なのか確かめてみる】新潟県道427号 五十子平真田線【新潟のデス・ロード/十日町市】</a>
</div>

<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>

<br>

<a href="../index.html">← 新潟県ページに戻る</a>

<script>
const center = [37.109,138.656381]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("南西からの場合、このまま県道方向に曲がらずに直進すれば容易に通過可能。")
  .openPopup();

</script>

</body>
</html>
