<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>京都府道653号</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#smallmap {
  width: 100%;
  height: 300px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>京都府道653号　碇網野線</h1>

<div class="card">
<p><b>ランク：</b> ★★★★☆</p>
<p><b>特徴：</b> ガードレールなしの狭道・舗装有</p>
<p><b>注意：</b> 碇〜小脇間通行不能　迂回路の市道(林道？)も通行止の可能性が高い</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
碇峠より絶景の碇高原牧場を通過する。その後の小脇までの峠越えが通行不能であり、迂回路も通行止と思われる。小脇から先は★2相当の狭い道が続く。
</p>
</div>

<div class="card">
<p><b>走行動画</b></p>
<a href="https://youtu.be/ke0XZEBXxe4?si=DvX-Ux0WTHdQYjQU/" target="_blank">文句なしにヤバい道だ。しかし最後には…[京都府道653号　碇網野線]</a>
</div>

<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>

<br>

<a href="../index.html">← 京都府ページに戻る</a>

<script>
const center = [35.7207,135.1919]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("碇高原牧場")
  .openPopup();

</script>

</body>
</html>
