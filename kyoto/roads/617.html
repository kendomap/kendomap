<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>京都府道617号</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#smallmap {
  width: 100%;
  height: 300px;
  border-radius: 8px;
}

</style>

</head>

<body>

<h1>京都府道617号　上延利線</h1>

<div class="card">
<p><b>ランク：</b> ★★★★☆</p>
<p><b>特徴：</b> 通行止以外は普通</p>
<p><b>注意：</b> 集落区間以外(大宮町新宮〜畑)通行不能</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
通行不能となっている峠越え区間以外の集落区間は、西側東側共にごく不通の県道である。
</p>
</div>

<div class="card">
<p><b>走行動画・ウェブサイト</b></p>
<a href="https://https://minkara.carview.co.jp/smart/userid/453915/car/1073191/4600302/photo.aspx/" target="_blank">丹後半島腐道アタック2015 Part13 京都府道618号上世屋内山線 & 617号上延利線 1</a>
</div>

<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>
<br>

<a href="../index.html">← 京都府ページに戻る</a>

<script>

// ★ここだけ変えればOK（県道の位置）
const center = [35.62, 135.2]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("府道617号峠")
  .openPopup();

</script>
  
</body>
</html>
