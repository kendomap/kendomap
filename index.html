<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>全国険道マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:sans-serif;
margin:0;
}

header{
background:#333;
color:white;
padding:15px;
font-size:24px;
}

.container{
padding:15px;
}

#map{
height:400px;
margin-top:20px;
border:2px solid #ccc;
}

</style>

</head>

<body>

<header>
全国険道マップ
</header>

<div class="container">

<h2>このサイトについて</h2>
<p>
全国の険道・酷道をまとめるサイトです。
クリックすると詳細情報を見ることができます。
</p>

<h2>更新履歴</h2>
<p>
2026/4/18 サイト作成
</p>

<h2>険道マップ</h2>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([36.0,138.0],6);

L.tileLayer(
'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
{
attribution:"国土地理院"
}
).addTo(map);

var marker = L.marker([35.7,139.7]).addTo(map);

marker.bindPopup("サンプル険道");

</script>

</body>
</html>
