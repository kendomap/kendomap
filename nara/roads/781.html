<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>三重・奈良県道781号</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#smallmap {
  width: 100%;
  height: 300px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>三重・奈良県道781号　都祁名張線</h1>

<div class="card">
<p><b>ランク：</b> ★★★☆☆</p>
<p><b>特徴：</b> 三重県区間のみ★3。奈良県側は基本★1程度の道。</p>
<p><b>注意：</b> 三重県区間崖沿い狭道</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
三重県から笠間峠を越えて、奈良県に入り、山の間の集落を結んでいく。三重県区間のみ狭いヘアピンが連続する険道である。奈良県側は、険しいところで★2相当、基本的には★1相当のありふれた山の道である。</p>
</div>

<div class="card">
<p><b>走行動画・ウェブサイト</b></p>
<a href="https://youtu.be/3OSHugD9LDw?si=p1GKo0_svDiYNbDQ/" target="_blank">県境前後でギャップが凄い県道　[三重・奈良県道781号 都祁名張線]</a>
</div>

<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>

<br>

<a href="../index.html">← 奈良県ページに戻る</a>

<script>
const center = [34.607868,136.052070]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("笠間峠")
  .openPopup();

</script>
  
</body>
</html>
