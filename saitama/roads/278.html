<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>埼玉県道278号</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
#smallmap {
  width: 100%;
  height: 300px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>埼玉県道278号　秩父多摩甲斐国立公園三峰線</h1>

<div class="card">
<p><b>ランク：</b> ★☆☆☆☆</p>
<p><b>特徴：</b> カーブ多め</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
山間部を抜ける区間が中心で、見通しの悪いカーブが連続する。
初心者は注意が必要な県道。
</p>
</div>

<div class="card">
<p><b>走行動画</b></p>
<a href="https://youtube.com/" target="_blank">YouTubeで見る</a>
</div>

<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>

<br>

<a href="../index.html">← 埼玉県ページに戻る</a>

<script>

// ★ここだけ変えればOK（県道の位置）
const center = [35.92, 138.93]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("終点")
  .openPopup();

</script>
  
</body>
</html>
