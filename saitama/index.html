<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>埼玉県険道一覧</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
height: 500px;
width: 100%;
}
</style>

</head>

<body>

<h1>埼玉県険道一覧</h1>

<h2>一覧</h2>
<ul>
<li>県道○号（追加予定）</li>
<li>埼玉県道278号</li>
</ul>

<h2>地図</h2>
<div id="map"></div>

<script>

var map = L.map('map').setView([35.9, 139.6], 9);

// 国土地理院地図
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
attribution: "国土地理院"
}).addTo(map);　

fetch("data.geojson")
.then(res => res.json())
.then(data => {

L.geoJSON(data, {
style: function(feature){

let rank = feature.properties.rank;

let color = "gray"; // デフォルト

if(rank === "★★★★★") color = "darkred";
else if(rank === "★★★★☆") color = "red";
else if(rank === "★★★☆☆") color = "orange";
else if(rank === "★★☆☆☆") color = "green";
else color = "blue";

return {
color: color,
weight: 6,
opacity: 0.9
};
},

onEachFeature: function(feature, layer){

layer.bindPopup(
"<b>" + feature.properties.name + "</b><br>" +
"ランク：" + feature.properties.rank + "<br>" +
feature.properties.description + "<br><br>" +
"<a href='" + feature.properties.page + "'>詳細ページへ</a>"
);

layer.on("click", function(){
layer.openPopup();
});

}

}).addTo(map);
});
</script>

</body>
</html>
