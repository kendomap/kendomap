<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>和歌山県道181号</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#smallmap {
  width: 100%;
  height: 300px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>和歌山県道181号　下湯川金屋線</h1>

<div class="card">
<p><b>ランク：</b> ★★★★★</p>
<p><b>特徴：</b> 路面荒廃・狭小</p>
<p><b>注意：</b> 暗夜峠区間通行不能</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
谷の集落どうしを繋ぐ役割を果たした後は、路面の荒れ果てた激狭な険道になる。峠越え区間は通行不能
</p>
</div>

<div class="card">
<p><b>走行動画</b></p>
<a href="https://youtu.be/zudCaFFmGGw?si=bMaowp1dugRnz23j" target="_blank">とにかく恐怖のオーラを感じた県道。もう絶対行きたくないわ…　【和歌山県道181号　下湯川金屋線】</a>
</div>

<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>

<br>

<a href="../index.html">← 和歌山県ページに戻る</a>

<script>

// ★ここだけ変えればOK（県道の位置）
const center = [35.0566, 135.435]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("暗夜峠")
  .openPopup();

</script>
  
</body>
</html>
