<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>和歌山県道182号</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
<style>
body{
font-family: sans-serif;
max-width: 900px;
margin: auto;
padding: 20px;
background:#fafafa;
}

h1{
border-bottom: 2px solid #333;
padding-bottom: 6px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#smallmap {
  width: 100%;
  height: 300px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>和歌山県道182号　境川金屋線</h1>

<div class="card">
<p><b>ランク：</b> ★★★☆☆</p>
<p><b>特徴：</b> 幅員狭い・カーブ多め</p>
<p><b>注意：</b> 離合困難区間あり</p>
</div>

<div class="card">
<p><b>ルート解説</b></p>
<p>
山間部の集落どうしを繋ぐ。山と谷に挟まれたガードレールなしの超細道が続く。
</p>
</div>

<div class="card">
<p><b>走行動画</b></p>
・<a href="https://youtu.be/X653qL8mUZM?si=hUsg9WUg3Nto3QXT" target="_blank">【激狭】　行ったことを後悔する県道へようこそ！和歌山県道182号線完全走破ドライブ</a>
・<a href="https://youtu.be/P3OKaS5BWYg?si=-Pfo4SAXueUqyzlG/" target="_blank">イカれた県道。その狂気はメンタルを抉る [和歌山県道182号　境川金屋線]</a>
</div>

<div class="card">
<p><b>ミニマップ</b></p>
<div id="smallmap"></div>
</div>

<br>

<a href="../index.html">← 和歌山県ページに戻る</a>

<script>

// ★ここだけ変えればOK（県道の位置）
const center = [34.077588,135.377424]; 

var map = L.map('smallmap').setView(center, 13);

// 国土地理院タイル
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: "国土地理院"
}).addTo(map);

// マーカー
L.marker(center).addTo(map)
  .bindPopup("峠")
  .openPopup();

</script>
  
</body>
</html>
